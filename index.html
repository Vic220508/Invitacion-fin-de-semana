<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tengo una propuesta</title>

<style>
body{
font-family: Arial;
background:#f4f8ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.caja{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
max-width:300px;
}

button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.si{
background:#4CAF50;
color:white;
}

.no{
background:#ddd;
}
</style>
</head>

<body>

<div class="caja">

<h2>Tengo una propuesta 👀</h2>

<p>¿Te gustaría ir conmigo a caminar al Parque Bicentenario este fin?</p>

<p>Plan tranquilo: caminar, platicar y algo de comer.</p>

<button class="si" onclick="alert('Perfecto, entonces planeamos 😊')">Suena bien</button>

<button class="no" onclick="alert('Bueno, tenía que intentarlo 😅')">Tal vez otro día</button>

</div>

</body>

</html>
